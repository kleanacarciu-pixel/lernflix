{# Referenzen: 2–3 Testimonials als klare Karten mit Sternebewertung #}
<section class="section section--beige refs reveal">
  <div class="content-wrapper">

    <div class="section__head">
      {% if module.eyebrow %}<p class="eyebrow">{{ module.eyebrow }}</p>{% endif %}
      {% if module.heading %}<h2 class="section__title">{{ module.heading }}</h2>{% endif %}
    </div>

    <div class="refs__grid">
      {% for item in module.quote_item %}
        <figure class="ref-card">
          <div class="ref-card__stars" aria-label="{{ item.rating }} von 5 Sternen">
            {% for i in range(0, item.rating) %}
              <svg width="18" height="18" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path d="M10 1.6l2.47 5.01 5.53.8-4 3.9.94 5.5L10 14.2l-4.95 2.6.94-5.5-4-3.9 5.53-.8z"/></svg>
            {% endfor %}
          </div>
          <blockquote class="ref-card__quote">{{ item.quote }}</blockquote>
          <figcaption class="ref-card__author">
            <div class="ref-card__name">{{ item.name }}</div>
            <div class="ref-card__role">{{ item.role }}</div>
          </figcaption>
        </figure>
      {% endfor %}
    </div>

  </div>
</section>
