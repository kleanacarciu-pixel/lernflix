<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500" fill="none">
  <defs>
    <linearGradient id="swoosh-icon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1769FF" stop-opacity="0.85"/>
      <stop offset="50%" stop-color="#1769FF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3a87ff" stop-opacity="0.9"/>
    </linearGradient>
    <style>
      .a-letter { font-family: 'Cormorant Garamond', 'Playfair Display', 'Times New Roman', serif; font-weight: 400; font-style: italic; fill: #0B1F3A; }
      .tagline { font-family: 'Cormorant Garamond', 'Playfair Display', 'Times New Roman', serif; font-style: italic; font-weight: 500; fill: #0B1F3A; }
    </style>
  </defs>

  <g transform="translate(250, 240)">
    <!-- Dezenter halb-kreis bogen oben -->
    <path d="M -165 -70 A 185 185 0 0 1 165 -70" stroke="#0B1F3A" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.55"/>

    <!-- Mini-punkte oben rechts -->
    <circle cx="155" cy="-135" r="4" fill="#0B1F3A"/>
    <circle cx="178" cy="-115" r="3.2" fill="#0B1F3A"/>
    <circle cx="192" cy="-90" r="2.8" fill="#0B1F3A"/>
    <circle cx="146" cy="-160" r="2.8" fill="#0B1F3A"/>

    <!-- Netflix-style blauer schwung -->
    <path d="M -180 100 Q -100 -10 -25 65 Q 60 140 130 38 Q 165 -10 200 -45"
          stroke="url(#swoosh-icon)" stroke-width="42" stroke-linecap="round" fill="none" opacity="0.45"/>
    <path d="M -178 96 Q -98 -14 -22 62 Q 62 136 132 36 Q 167 -14 202 -48"
          stroke="#1769FF" stroke-width="22" stroke-linecap="round" fill="none" opacity="0.95"/>

    <!-- Elegant serif italic A -->
    <text x="0" y="105" font-size="320" class="a-letter" text-anchor="middle">A</text>

    <!-- Swoosh-flick am ende -->
    <path d="M 202 -48 Q 215 -60 220 -78" stroke="#1769FF" stroke-width="14" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Tagline unter -->
  <text x="250" y="470" font-size="30" class="tagline" text-anchor="middle">Lernflix · lerne mit Anna</text>
</svg>
